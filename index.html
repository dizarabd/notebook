<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার হিসাব</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json?v=2">
    <meta name="theme-color" content="#1e3a8a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hidden-section { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <div id="auth-section" class="flex-1 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100 text-center">
            <div class="flex justify-center mb-4">
                <img src="logo.png" alt="Logo" class="w-20 h-20 rounded-2xl shadow-md">
            </div>
            <h2 class="text-2xl font-bold text-blue-900 mb-2">আমার হিসাব</h2>
            <p class="text-gray-500 text-sm mb-6">আপনার ডিভাইসে নিরাপদ ও ব্যক্তিগত ডিজিটাল খাতা</p>
            
            <!-- Setup Fields -->
            <div id="setup-fields" class="hidden-section mb-4 text-left">
                <p class="text-green-600 text-sm font-medium mb-3 text-center">নতুন ৪ ডিজিটের পিন ও রিকভারি সেট করুন</p>
                <input type="password" id="setup-pin" maxlength="4" placeholder="নতুন ৪ ডিজিটের পিন" class="w-full text-center text-xl border-2 border-gray-300 rounded-lg p-2 mb-3 focus:outline-none focus:border-blue-900 tracking-widest">
                
                <label class="text-xs text-gray-500 block mb-1">পিন ভুলে গেলে পুনরুদ্ধারের জন্য প্রশ্ন সিলেক্ট করুন:</label>
                <select id="setup-question" class="w-full border-2 border-gray-300 rounded-lg p-2 mb-3 text-sm focus:outline-none focus:border-blue-900">
                    <option value="আপনার প্রথম স্কুলের নাম কি?">আপনার প্রথম স্কুলের নাম কি?</option>
                    <option value="আপনার প্রিয় রঙের নাম কি?">আপনার প্রিয় রঙের নাম কি?</option>
                    <option value="আপনার প্রিয় শিক্ষকের নাম কি?">আপনার প্রিয় শিক্ষকের নাম কি?</option>
                    <option value="আপনার জন্মস্থান কোথায়?">আপনার জন্মস্থান কোথায়?</option>
                </select>
                <input type="text" id="setup-answer" placeholder="আপনার উত্তরটি লিখুন" class="w-full border-2 border-gray-300 rounded-lg p-2 text-sm focus:outline-none focus:border-blue-900">
            </div>

            <!-- Login Fields -->
            <div id="login-fields" class="mb-4">
                <p class="text-blue-600 text-sm font-medium mb-4">লগইন করতে ৪ ডিজিটের পিন দিন</p>
                <input type="password" id="auth-pin" maxlength="4" placeholder="••••" class="w-32 text-center text-3xl border-2 border-gray-300 rounded-lg p-2 mb-2 focus:outline-none focus:border-blue-900 tracking-widest">
                <button onclick="forgotPinModal()" class="block mx-auto text-xs text-red-500 hover:underline mb-4">পিন ভুলে গেছেন?</button>
            </div>
            
            <button onclick="handleAuth()" class="w-full bg-blue-900 text-white py-3 rounded-xl font-semibold hover:bg-blue-800 transition duration-200 shadow-md">প্রবেশ করুন</button>
        </div>
    </div>

    <div id="app-section" class="hidden-section flex flex-col flex-1">
        <header class="bg-blue-900 text-white px-4 py-4 shadow-md sticky top-0 z-50 flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3 w-full sm:w-auto justify-between sm:justify-start">
                <div class="flex items-center gap-3">
                    <img src="logo.png" alt="Logo" class="w-9 h-9 rounded-lg">
                    <h1 class="text-xl font-bold">আমার হিসাব</h1>
                </div>
                <button id="install-btn" class="hidden-section sm:hidden bg-amber-500 hover:bg-amber-600 text-xs text-white font-bold px-3 py-2 rounded-lg transition shadow">এপ্স ডাউনলোড</button>
            </div>
            
            <div class="flex items-center justify-between sm:justify-end gap-2 w-full sm:w-auto border-t border-blue-800 pt-2 sm:pt-0 sm:border-0">
                <div class="flex gap-1.5 border-r border-blue-800 pr-2 mr-1">
                    <button onclick="exportBackup()" class="bg-blue-700 hover:bg-blue-600 text-[11px] text-white font-medium px-2.5 py-1.5 rounded-lg transition shadow flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        ব্যাকআপ ডাউনলোড
                    </button>
                    <button onclick="importBackup()" class="bg-emerald-600 hover:bg-emerald-500 text-[11px] text-white font-medium px-2.5 py-1.5 rounded-lg transition shadow flex items-center gap-1">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                        ব্যাকআপ ইম্পোর্ট
                    </button>
                </div>
                <div class="flex gap-1.5 items-center">
                    <button id="install-btn-desktop" class="hidden-section hidden sm:block bg-amber-500 hover:bg-amber-600 text-xs text-white font-bold px-3 py-2 rounded-lg transition shadow">এপ্স ডাউনলোড</button>
                    <button onclick="changePinSetting()" class="bg-slate-700 hover:bg-slate-600 text-xs px-3 py-2 rounded-lg font-medium transition shadow flex items-center gap-1" title="পিন পরিবর্তন করুন">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0" /></svg>
                        পিন পরিবর্তন
                    </button>
                    <button onclick="logout()" class="bg-red-600 hover:bg-red-700 text-xs px-3 py-2 rounded-lg font-medium transition shadow">লগআউট</button>
                </div>
            </div>
        </header>

        <input type="file" id="backup-file-input" accept=".json" class="hidden-section" onchange="handleBackupFile(this)">

        <main class="p-4 max-w-4xl mx-auto w-full flex-1">
            <div class="grid grid-cols-3 gap-3 mb-6">
                <div class="bg-green-50 p-4 rounded-xl border border-green-200 text-center shadow-sm">
                    <p class="text-xs text-green-700 font-medium mb-1">মোট পাবো</p>
                    <p id="total-receivable" class="text-lg font-bold text-green-600">৳ ০</p>
                </div>
                <div class="bg-red-50 p-4 rounded-xl border border-red-200 text-center shadow-sm">
                    <p class="text-xs text-red-700 font-medium mb-1">মোট দেবো</p>
                    <p id="total-payable" class="text-lg font-bold text-red-600">৳ ০</p>
                </div>
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 text-center shadow-sm">
                    <p class="text-xs text-blue-700 font-medium mb-1">নিট ব্যালেন্স</p>
                    <p id="net-balance" class="text-lg font-bold text-blue-900">৳ ০</p>
                </div>
            </div>

            <div class="flex gap-2 mb-4">
                <input type="text" id="search-input" oninput="renderCustomers()" placeholder="গ্রাহকের নাম খুঁজুন..." class="flex-1 px-4 py-2 border rounded-xl focus:outline-none focus:border-blue-900 shadow-sm text-sm">
                <button onclick="openAddCustomerModal()" class="bg-blue-900 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-blue-800 transition shadow">+ নতুন কাস্টমার</button>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="p-4 border-b border-gray-100 bg-gray-50/70">
                    <h3 class="font-bold text-gray-700">গ্রাহক তালিকা ও হিসাব</h3>
                </div>
                <div id="customer-list" class="divide-y divide-gray-100"></div>
            </div>
        </main>
    </div>

    <script>
        let db;
        let currentUserPin = null;
        let currentQuestion = null;
        let currentAnswer = null;
        let customers = [];
        let deferredPrompt;

        // Initialize IndexedDB
        const request = indexedDB.open("AmarHisabDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("settings")) db.createObjectStore("settings");
            if (!db.objectStoreNames.contains("customers")) db.createObjectStore("customers", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            checkAuthStatus();
        };

        // Auth Status Check
        function checkAuthStatus() {
            const tx = db.transaction("settings", "readonly");
            const store = tx.objectStore("settings");
            
            const getPin = store.get("user_pin");
            const getQues = store.get("recovery_question");
            const getAns = store.get("recovery_answer");
            
            getPin.onsuccess = () => {
                if (getPin.result) {
                    currentUserPin = getPin.result;
                    currentQuestion = getQues.result || "আপনার প্রিয় রঙের নাম কি?";
                    currentAnswer = getAns.result || "";
                    document.getElementById('setup-fields').classList.add('hidden-section');
                    document.getElementById('login-fields').classList.remove('hidden-section');
                } else {
                    document.getElementById('setup-fields').classList.remove('hidden-section');
                    document.getElementById('login-fields').classList.add('hidden-section');
                }
            };
        }

        // Handle Login or Registration
        function handleAuth() {
            if (!currentUserPin) {
                // Setup / Registration Process
                const pinInput = document.getElementById('setup-pin').value;
                const questionInput = document.getElementById('setup-question').value;
                const answerInput = document.getElementById('setup-answer').value.trim();

                if (pinInput.length !== 4) {
                    Swal.fire({ icon: 'error', title: 'ভুল ইনপুট', text: '৪ ডিজিটের পিন দিন।' });
                    return;
                }
                if (!answerInput) {
                    Swal.fire({ icon: 'error', title: 'ভুল ইনপুট', text: 'রিকভারি প্রশ্নের উত্তরটি লিখুন।' });
                    return;
                }

                const tx = db.transaction("settings", "readwrite");
                tx.objectStore("settings").put(pinInput, "user_pin");
                tx.objectStore("settings").put(questionInput, "recovery_question");
                tx.objectStore("settings").put(answerInput.toLowerCase(), "recovery_answer");
                
                tx.oncomplete = () => {
                    currentUserPin = pinInput;
                    currentQuestion = questionInput;
                    currentAnswer = answerInput.toLowerCase();
                    Swal.fire({ icon: 'success', title: 'পিন ও সিকিউরিটি সেট হয়েছে', text: 'আপনার অ্যাপটি এখন সম্পূর্ণ নিরাপদ।', timer: 2000, showConfirmButton: false });
                    loadApp();
                };
            } else {
                // Regular Login Process
                const loginPin = document.getElementById('auth-pin').value;
                if (loginPin === currentUserPin) {
                    loadApp();
                } else {
                    Swal.fire({ icon: 'error', title: 'ভুল পিন', text: 'সঠিক পিন নাম্বার দিয়ে আবার চেষ্টা করুন।' });
                }
            }
        }

        // Forgot Pin Recover Dialog
        async function forgotPinModal() {
            if (!currentAnswer) {
                Swal.fire({ icon: 'warning', title: 'দুঃখিত', text: 'আপনার কোনো সিকিউরিটি কোশ্চেন সেট করা নেই। অ্যাপের মাস্টার রিকভারি কোড "9988" ব্যবহার করে ট্রাই করুন।' });
            }

            const { value: formValues } = await Swal.fire({
                title: 'পিন পুনরুদ্ধার করুন',
                html: `
                    <p class="text-sm text-gray-600 mb-3 text-left"><b>প্রশ্ন:</b> ${currentQuestion}</p>
                    <input id="swal-recovery-ans" type="text" class="swal2-input mt-0" placeholder="আপনার উত্তরটি লিখুন">
                    <input id="swal-recovery-new-pin" type="password" maxlength="4" class="swal2-input text-center tracking-widest" placeholder="নতুন ৪ ডিজিটের পিন">
                `,
                focusConfirm: false,
                confirmButtonText: 'রিসেট করুন',
                confirmButtonColor: '#1e3a8a',
                showCancelButton: true,
                cancelButtonText: 'বাতিল',
                preConfirm: () => {
                    const ans = document.getElementById('swal-recovery-ans').value.trim().toLowerCase();
                    const newPin = document.getElementById('swal-recovery-new-pin').value;
                    
                    // Master code bypassing (9988) or Valid Secret Answer matching
                    if (ans !== currentAnswer && ans !== "9988") {
                        Swal.showValidationMessage('সিকিউরিটি উত্তরটি সঠিক নয়!');
                        return false;
                    }
                    if (newPin.length !== 4) {
                        Swal.showValidationMessage('নতুন পিন অবশ্যই ৪ ডিজিটের হতে হবে');
                        return false;
                    }
                    return { newPin };
                }
            });

            if (formValues) {
                const tx = db.transaction("settings", "readwrite");
                tx.objectStore("settings").put(formValues.newPin, "user_pin");
                tx.oncomplete = () => {
                    currentUserPin = formValues.newPin;
                    document.getElementById('auth-pin').value = '';
                    Swal.fire({ icon: 'success', title: 'রিসেট সফল', text: 'নতুন পিন সফলভাবে আপডেট হয়েছে। নতুন পিন দিয়ে প্রবেশ করুন।', confirmButtonColor: '#1e3a8a' });
                };
            }
        }

        function loadApp() {
            document.getElementById('auth-section').classList.add('hidden-section');
            document.getElementById('app-section').classList.remove('hidden-section');
            loadCustomers();
        }

        function logout() {
            document.getElementById('auth-pin').value = '';
            document.getElementById('app-section').classList.add('hidden-section');
            document.getElementById('auth-section').classList.remove('hidden-section');
            checkAuthStatus();
        }

        // Change Password / PIN Setting Function
        async function changePinSetting() {
            const { value: formValues } = await Swal.fire({
                title: 'পিন কোড পরিবর্তন করুন',
                html:
                    '<input id="swal-old-pin" type="password" maxlength="4" class="swal2-input text-center tracking-widest" placeholder="বর্তমান পিন">' +
                    '<input id="swal-new-pin" type="password" maxlength="4" class="swal2-input text-center tracking-widest" placeholder="নতুন ৪ ডিজিটের পিন">',
                focusConfirm: false,
                confirmButtonText: 'পরিবর্তন করুন',
                confirmButtonColor: '#1e3a8a',
                showCancelButton: true,
                cancelButtonText: 'বাতিল',
                preConfirm: () => {
                    const oldPin = document.getElementById('swal-old-pin').value;
                    const newPin = document.getElementById('swal-new-pin').value;
                    
                    if (oldPin.length !== 4 || newPin.length !== 4) {
                        Swal.showValidationMessage('উভয় পিনই অবশ্যই ৪ ডিজিটের হতে হবে');
                        return false;
                    }
                    if (oldPin !== currentUserPin) {
                        Swal.showValidationMessage('বর্তমান পিন কোডটি সঠিক নয়');
                        return false;
                    }
                    if (oldPin === newPin) {
                        Swal.showValidationMessage('নতুন পিন এবং পুরাতন পিন একই হতে পারবে না');
                        return false;
                    }
                    return { newPin };
                }
            });

            if (formValues) {
                const tx = db.transaction("settings", "readwrite");
                tx.objectStore("settings").put(formValues.newPin, "user_pin");
                tx.oncomplete = () => {
                    currentUserPin = formValues.newPin;
                    Swal.fire({ icon: 'success', title: 'পিন পরিবর্তিত হয়েছে', text: 'আপনার সিকিউরিটি পিন সফলভাবে আপডেট করা হয়েছে।', timer: 2000, showConfirmButton: false });
                };
            }
        }

        // Data Management
        function loadCustomers() {
            const tx = db.transaction("customers", "readonly");
            const store = tx.objectStore("customers");
            const getAll = store.getAll();
            
            getAll.onsuccess = () => {
                customers = getAll.result;
                renderCustomers();
            };
        }

        function renderCustomers() {
            const listContainer = document.getElementById('customer-list');
            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            listContainer.innerHTML = '';
            
            let totalReceivable = 0;
            let totalPayable = 0;

            const filteredCustomers = customers.filter(c => c.name.toLowerCase().includes(searchQuery) || c.phone.includes(searchQuery));

            if(filteredCustomers.length === 0) {
                listContainer.innerHTML = `<p class="p-8 text-center text-gray-400 text-sm">কোনো কাস্টমার পাওয়া যায়নি।</p>`;
            }

            filteredCustomers.forEach(customer => {
                let balance = 0;
                customer.transactions.forEach(t => {
                    if (t.type === 'get') balance += t.amount;
                    if (t.type === 'give') balance -= t.amount;
                });

                if (balance > 0) totalReceivable += balance;
                if (balance < 0) totalPayable += Math.abs(balance);

                const balanceText = balance >= 0 ? `৳ ${balance} (পাবো)` : `৳ ${Math.abs(balance)} (দেবো)`;
                const balanceClass = balance > 0 ? 'text-green-600' : balance < 0 ? 'text-red-600' : 'text-gray-500';

                const div = document.createElement('div');
                div.className = "p-4 flex justify-between items-center hover:bg-gray-50 transition";
                div.innerHTML = `
                    <div onclick="viewCustomerTransactions('${customer.id}')" class="cursor-pointer flex-1">
                        <h4 class="font-semibold text-gray-900">${customer.name}</h4>
                        <p class="text-xs text-gray-500">${customer.phone || 'মোবাইল নম্বর নেই'}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold ${balanceClass}">${balanceText}</span>
                        <button onclick="deleteCustomer('${customer.id}')" class="text-red-400 hover:text-red-600 text-sm p-1">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>
                `;
                listContainer.appendChild(div);
            });

            document.getElementById('total-receivable').innerText = `৳ ${totalReceivable}`;
            document.getElementById('total-payable').innerText = `৳ ${totalPayable}`;
            const net = totalReceivable - totalPayable;
            document.getElementById('net-balance').innerText = `৳ ${net}`;
            document.getElementById('net-balance').className = `text-lg font-bold ${net >= 0 ? 'text-green-600' : 'text-red-600'}`;
        }

        async function openAddCustomerModal() {
            const { value: formValues } = await Swal.fire({
                title: 'নতুন গ্রাহক যোগ করুন',
                html:
                    '<input id="swal-input1" class="swal2-input" placeholder="গ্রাহকের নাম (আবশ্যক)">' +
                    '<input id="swal-input2" class="swal2-input" placeholder="মোবাইল নম্বর (ঐচ্ছিক)">',
                focusConfirm: false,
                confirmButtonText: 'সংরক্ষণ করুন',
                confirmButtonColor: '#1e3a8a',
                showCancelButton: true,
                cancelButtonText: 'বাতিল',
                preConfirm: () => {
                    const name = document.getElementById('swal-input1').value.trim();
                    const phone = document.getElementById('swal-input2').value.trim();
                    if (!name) {
                        Swal.showValidationMessage('অনুগ্রহ করে নাম লিখুন');
                    }
                    return { name, phone };
                }
            });

            if (formValues) {
                const newCustomer = {
                    id: 'cust_' + Date.now(),
                    name: formValues.name,
                    phone: formValues.phone,
                    transactions: []
                };
                const tx = db.transaction("customers", "readwrite");
                tx.objectStore("customers").add(newCustomer);
                tx.oncomplete = () => {
                    Swal.fire({ icon: 'success', title: 'সফল', text: 'নতুন গ্রাহক তালিকাভুক্ত হয়েছে।', timer: 1500, showConfirmButton: false });
                    loadCustomers();
                };
            }
        }

        async function viewCustomerTransactions(id) {
            const customer = customers.find(c => c.id === id);
            if (!customer) return;

            let txHtml = customer.transactions.map((t, index) => `
                <div class="flex justify-between items-center py-2 border-b text-sm">
                    <span class="text-gray-500 text-xs">${t.date}</span>
                    <span class="font-medium text-gray-700">${t.note || 'বিবরণ নেই'}</span>
                    <span class="${t.type === 'get' ? 'text-green-600' : 'text-red-600'} font-bold">
                        ${t.type === 'get' ? '+' : '-'} ৳${t.amount}
                    </span>
                    <button onclick="Swal.close(); deleteTransaction('${customer.id}', ${index})" class="text-red-400 hover:text-red-600 text-xs ml-2">মুছুন</button>
                </div>
            `).join('');

            if(customer.transactions.length === 0) txHtml = '<p class="text-gray-400 text-sm py-4">কোনো লেনদেন নেই।</p>';

            await Swal.fire({
                title: `<span class="text-blue-900">${customer.name}</span>`,
                html: `
                    <p class="text-xs text-gray-500 mb-4">${customer.phone || ''}</p>
                    <div class="flex gap-2 mb-4 justify-center">
                        <button onclick="Swal.close(); openAddTransactionModal('${customer.id}', 'get')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold">+ পাবো (জমা)</button>
                        <button onclick="Swal.close(); openAddTransactionModal('${customer.id}', 'give')" class="bg-red-600 text-white px-4 py-2 rounded-lg text-xs font-bold">- দেবো (বাকি)</button>
                    </div>
                    <h4 class="text-left font-bold text-gray-700 text-sm mb-2 border-b pb-1">লেনদেনের ইতিহাস:</h4>
                    <div class="max-h-60 overflow-y-auto">${txHtml}</div>
                `,
                showConfirmButton: false,
                showCloseButton: true
            });
        }

        async function openAddTransactionModal(customerId, type) {
            const title = type === 'get' ? 'পাবো (জমা) যোগ করুন' : 'দেবো (বাকি) যোগ করুন';
            const { value: formValues } = await Swal.fire({
                title: title,
                html:
                    '<input id="tx-amount" type="number" class="swal2-input" placeholder="টাকার পরিমাণ (৳)">' +
                    '<input id="tx-note" class="swal2-input" placeholder="বিবরণ (যেমন: চাল বিক্রি)">',
                focusConfirm: false,
                confirmButtonText: 'যোগ করুন',
                confirmButtonColor: type === 'get' ? '#16a34a' : '#dc2626',
                showCancelButton: true,
                cancelButtonText: 'বাতিল',
                preConfirm: () => {
                    const amount = parseFloat(document.getElementById('tx-amount').value);
                    const note = document.getElementById('tx-note').value.trim();
                    if (!amount || amount <= 0) {
                        Swal.showValidationMessage('সঠিক টাকার পরিমাণ লিখুন');
                    }
                    return { amount, note };
                }
            });

            if (formValues) {
                const customer = customers.find(c => c.id === customerId);
                const newTx = {
                    amount: formValues.amount,
                    note: formValues.note,
                    type: type,
                    date: new Date().toLocaleDateString('bn-BD')
                };
                customer.transactions.push(newTx);

                const tx = db.transaction("customers", "readwrite");
                tx.objectStore("customers").put(customer);
                tx.oncomplete = () => {
                    Swal.fire({ icon: 'success', title: 'লেনদেন যুক্ত হয়েছে', timer: 1000, showConfirmButton: false });
                    loadCustomers();
                };
            }
        }

        async function deleteCustomer(id) {
            const { value: pin } = await Swal.fire({
                title: 'গ্রাহক ডিলিট নিশ্চিত করুন',
                text: 'গ্রাহকের সম্পূর্ণ হিসাব মুছে যাবে! নিশ্চিত করতে আপনার ৪ ডিজিটের পিন কোড দিন:',
                input: 'password',
                inputPlaceholder: '••••',
                inputAttributes: { maxlength: 4 },
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'ডিলিট করুন',
                cancelButtonText: 'বাতিল'
            });

            if (pin) {
                if (pin === currentUserPin) {
                    const tx = db.transaction("customers", "readwrite");
                    tx.objectStore("customers").delete(id);
                    tx.oncomplete = () => {
                        Swal.fire({ icon: 'success', title: 'ডিলিট সম্পন্ন হয়েছে', text: 'গ্রাহকের তথ্য মুছে ফেলা হয়েছে।', timer: 1500, showConfirmButton: false });
                        loadCustomers();
                    };
                } else {
                    Swal.fire({ icon: 'error', title: 'ভুল পিন', text: 'পিন কোড সঠিক নয়, ডিলিট করা যায়নি।' });
                }
            }
        }

        async function deleteTransaction(customerId, index) {
            const { value: pin } = await Swal.fire({
                title: 'লেনদেন ডিলিট নিশ্চিত করুন',
                text: 'এই লেনদেনটি মুছে ফেলতে আপনার ৪ ডিজিটের পিন কোড দিন:',
                input: 'password',
                inputPlaceholder: '••••',
                inputAttributes: { maxlength: 4 },
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                confirmButtonText: 'ডিলিট করুন',
                cancelButtonText: 'বাতিল'
            });

            if (pin) {
                if (pin === currentUserPin) {
                    const customer = customers.find(c => c.id === customerId);
                    customer.transactions.splice(index, 1);

                    const tx = db.transaction("customers", "readwrite");
                    tx.objectStore("customers").put(customer);
                    tx.oncomplete = () => {
                        Swal.fire({ icon: 'success', title: 'ডিলিট হয়েছে', timer: 1000, showConfirmButton: false });
                        loadCustomers();
                    };
                } else {
                    Swal.fire({ icon: 'error', title: 'ভুল পিন', text: 'পিন কোড সঠিক নয়!' });
                }
            }
        }

        // Export Backup System
        function exportBackup() {
            const tx = db.transaction("customers", "readonly");
            const store = tx.objectStore("customers");
            const getAll = store.getAll();

            getAll.onsuccess = () => {
                const backupData = {
                    version: "1.0",
                    generatedAt: new Date().toISOString(),
                    data: getAll.result
                };

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData));
                const downloadAnchor = document.createElement('a');
                
                const dateStr = new Date().toLocaleDateString('bn-BD').replace(/\//g, '-');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `আমার_হিসাব_ব্যাকআপ_${dateStr}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();

                Swal.fire({ icon: 'success', title: 'ব্যাকআপ সফল', text: 'আপনার হিসাবের ফাইলটি সুরক্ষিতভাবে ডাউনলোড হয়েছে।', confirmButtonColor: '#1e3a8a' });
            };
        }

        function importBackup() {
            document.getElementById('backup-file-input').click();
        }

        function handleBackupFile(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const importedObj = JSON.parse(e.target.result);
                    if (!importedObj.data || !Array.isArray(importedObj.data)) throw new Error("ভুল ফাইল");

                    const { value: pin } = await Swal.fire({
                        title: 'পিন ভেরিফাই করুন',
                        text: 'ব্যাকআপ ডেটা রিস্টোর করার জন্য আপনার ৪ ডিজিটের লগইন পিন দিন:',
                        input: 'password',
                        inputPlaceholder: '••••',
                        inputAttributes: { maxlength: 4 },
                        showCancelButton: true,
                        confirmButtonColor: '#10b981',
                        confirmButtonText: 'তথ্য আমদানি করুন',
                        cancelButtonText: 'বাতিল'
                    });

                    if (pin === currentUserPin) {
                        const tx = db.transaction("customers", "readwrite");
                        const store = tx.objectStore("customers");
                        store.clear();
                        importedObj.data.forEach(cust => store.put(cust));

                        tx.oncomplete = () => {
                            Swal.fire({ icon: 'success', title: 'আমদানি সম্পন্ন', text: 'ব্যাকআপ সফলভাবে রিস্টোর হয়েছে।', confirmButtonColor: '#1e3a8a' });
                            loadCustomers();
                        };
                    } else if(pin) {
                        Swal.fire({ icon: 'error', title: 'ভুল পিন', text: 'পিন সঠিক নয়!' });
                    }
                } catch (err) {
                    Swal.fire({ icon: 'error', title: 'ব্যর্থ হয়েছে', text: 'সঠিক ব্যাকআপ ফাইল (.json) নির্বাচন করুন।' });
                } finally {
                    input.value = '';
                }
            };
            reader.readAsText(file);
        }

        // PWA Installation Setup
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').classList.remove('hidden-section');
            document.getElementById('install-btn-desktop').classList.remove('hidden-section');
        });

        const installApp = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-btn').classList.add('hidden-section');
                    document.getElementById('install-btn-desktop').classList.add('hidden-section');
                }
                deferredPrompt = null;
            }
        };

        document.getElementById('install-btn').addEventListener('click', installApp);
        document.getElementById('install-btn-desktop').addEventListener('click', installApp);

        window.addEventListener('appinstalled', () => {
            document.getElementById('install-btn').classList.add('hidden-section');
            document.getElementById('install-btn-desktop').classList.add('hidden-section');
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log("SW failed", err));
        }
    </script>
</body>
</html>
